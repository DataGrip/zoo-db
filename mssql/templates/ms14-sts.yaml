apiVersion: v1
kind: Service
metadata:
  name: ms14
  labels:
    mssql: ms14
spec:
  ports:
    - port: 1433
      name: mssql
  {{/*clusterIP: None*/}}
  publishNotReadyAddresses: true
  selector:
    mssql: ms14
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "mssql.name" . }}-14
  labels:
    mssql: ms14
  {{- include "mssql.labels" . | nindent 4 }}
spec:
  serviceName: ms14
  replicas: 1
  selector:
    matchLabels:
      mssql: ms14
    {{- include "mssql.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        mssql: ms14
      {{- include "mssql.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        fsGroup: 1000
      setHostnameAsFQDN: true
      imagePullSecrets:
      {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      containers:
      - name: ms14
        imagePullPolicy: {{ .Values.pullPolicy }}
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
        env:
        - name: ACCEPT_EULA
          valueFrom:
            configMapKeyRef:
              key: ACCEPT_EULA
              name: {{ include "mssql.fullname" . }}-sql-env
        - name: MSSQL_PID
          valueFrom:
            configMapKeyRef:
              key: MSSQL_PID
              name: {{ include "mssql.fullname" . }}-sql-env
        - name: MSSQL_SA_PASSWORD
          valueFrom:
            configMapKeyRef:
              key: MSSQL_SA_PASSWORD
              name: {{ include "mssql.fullname" . }}-sql-env
        image: {{ .Values.ms14.image.repository }}:{{ .Values.ms14.image.tag | default
          .Chart.AppVersion }}
        ports:
        - containerPort: 1433
          protocol: TCP
        resources: {{- toYaml .Values.ms14.resources | nindent 10 }}
        volumeMounts:
        - mountPath: /scripts
          name: menagerie
      hostname: ms14
      volumes:
      - configMap:
            name: menagerie
        name: menagerie
